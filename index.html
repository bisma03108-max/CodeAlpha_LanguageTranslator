<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Language Translator</title>
    <!-- FontAwesome Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* Animated Gradient Background */
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #311042, #020617);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            max-width: 850px;
            width: 100%;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateY(0);
            transition: all 0.3s ease;
        }

        h2 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 30px;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #a78bfa, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .wrapper {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .text-area-box {
            flex: 1;
            position: relative;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .text-area-box:focus-within {
            border-color: #8b5cf6;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
        }

        textarea {
            width: 100%;
            height: 220px;
            border: none;
            outline: none;
            resize: none;
            padding: 20px;
            font-size: 16px;
            color: #f1f5f9;
            background: transparent;
            line-height: 1.6;
        }

        textarea::placeholder {
            color: #64748b;
        }

        .to-text-box {
            background: rgba(15, 23, 42, 0.4);
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .row select {
            flex: 1;
            padding: 8px 10px;
            border: none;
            outline: none;
            font-size: 15px;
            font-weight: 500;
            color: #e2e8f0;
            cursor: pointer;
            background: transparent;
        }

        .row select option {
            background: #0f172a;
            color: #fff;
        }

        .icons {
            display: flex;
            gap: 8px;
        }

        .icons i {
            color: #94a3b8;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s ease;
            padding: 10px;
            border-radius: 10px;
        }

        .icons i:hover {
            color: #22d3ee;
            background: rgba(34, 211, 238, 0.1);
        }

        .exchange {
            color: #94a3b8;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .exchange:hover {
            transform: rotate(180deg);
            color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.3);
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 30px;
            border: none;
            outline: none;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(90deg, #7c3aed, #0891b2);
            font-size: 16px;
            font-weight: 600;
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        button:hover {
            background: linear-gradient(90deg, #6d28d9, #0e7490);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .wrapper {
                flex-direction: column;
                gap: 15px;
            }
            textarea {
                height: 160px;
            }
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .exchange {
                align-self: center;
                transform: rotate(90deg);
            }
            .exchange:hover {
                transform: rotate(270deg);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Language Translator</h2>
    <div class="wrapper">
        <div class="text-area-box">
            <textarea class="from-text" placeholder="Type or paste text here..."></textarea>
        </div>
        <div class="exchange">
            <i class="fas fa-exchange-alt"></i>
        </div>
        <div class="text-area-box to-text-box">
            <textarea class="to-text" placeholder="Translation will appear here..." readonly></textarea>
        </div>
    </div>
    
    <div class="controls">
        <div class="row from">
            <select id="from-lang"></select>
            <div class="icons">
                <i id="from-volume" class="fas fa-volume-up" title="Speak"></i>
                <i id="from-copy" class="fas fa-copy" title="Copy"></i>
            </div>
        </div>

        <div class="row to">
            <select id="to-lang"></select>
            <div class="icons">
                <i id="to-copy" class="fas fa-copy" title="Copy"></i>
                <i id="to-volume" class="fas fa-volume-up" title="Speak"></i>
            </div>
        </div>
    </div>
    
    <button id="translate-btn">Translate Text</button>
</div>

<script>
    const countries = {
        "en-GB": "English",
        "hi-IN": "Hindi",
        "ur-PK": "Urdu",
        "es-ES": "Spanish",
        "fr-FR": "French",
        "ar-SA": "Arabic",
        "zh-CN": "Chinese",
        "de-DE": "German"
    };

    const fromText = document.querySelector(".from-text");
    const toText = document.querySelector(".to-text");
    const selectTag = document.querySelectorAll("select");
    const exchangeIcon = document.querySelector(".exchange");
    const translateBtn = document.querySelector("#translate-btn");
    const icons = document.querySelectorAll(".icons i");

    selectTag.forEach((tag, id) => {
        for (const country_code in countries) {
            let selected = id == 0 ? (country_code == "en-GB" ? "selected" : "") : (country_code == "hi-IN" ? "selected" : "");
            let option = `<option value="${country_code}" ${selected}>${countries[country_code]}</option>`;
            tag.insertAdjacentHTML("beforeend", option);
        }
    });

    exchangeIcon.addEventListener("click", () => {
        let tempText = fromText.value;
        let tempLang = selectTag[0].value;
        fromText.value = toText.value;
        selectTag[0].value = selectTag[1].value;
        toText.value = tempText;
        selectTag[1].value = tempLang;
    });

    translateBtn.addEventListener("click", () => {
        let text = fromText.value.trim();
        let translateFrom = selectTag[0].value;
        let translateTo = selectTag[1].value;
        
        if(!text) {
            toText.value = "";
            return;
        }
        
        toText.placeholder = "Translating with AI...";
        
        let apiUrl = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${translateFrom}|${translateTo}`;
        
        fetch(apiUrl)
            .then(res => res.json())
            .then(data => {
                toText.value = data.responseData.translatedText;
                toText.placeholder = "Translation will appear here...";
            })
            .catch(error => {
                console.error("Error:", error);
                toText.value = "Something went wrong. Please try again.";
            });
    });

    icons.forEach(icon => {
        icon.addEventListener("click", ({target}) => {
            if(!fromText.value && !toText.value) return;
            
            if(target.id === "from-copy") {
                navigator.clipboard.writeText(fromText.value);
            } else if(target.id === "to-copy") {
                navigator.clipboard.writeText(toText.value);
            } else {
                let utterance;
                if(target.id === "from-volume") {
                    utterance = new SpeechSynthesisUtterance(fromText.value);
                    utterance.lang = selectTag[0].value;
                } else {
                    utterance = new SpeechSynthesisUtterance(toText.value);
                    utterance.lang = selectTag[1].value;
                }
                speechSynthesis.speak(utterance);
            }
        });
    });
</script>

</body>
</html>
